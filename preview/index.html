<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Resilient Wealth Group | Weekly Agent Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0E2440;
    --navy-deep:#0A1A30;
    --gold:#C2A14D;
    --gold-soft:#D8BC78;
    --paper:#F4F1E9;
    --card:#FFFFFF;
    --ink:#16263D;
    --muted:#5C6B7E;
    --line:rgba(14,36,64,.12);
    --line-strong:rgba(14,36,64,.22);
    --good:#2E7D5B;
    --warn:#B0691F;
    --field:#FBFAF6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Hanken Grotesk',system-ui,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(194,161,77,.10), transparent 60%),
      var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .num{font-variant-numeric:tabular-nums;}

  /* Masthead */
  .masthead{
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 100%);
    color:#fff;
    padding:34px 24px 30px;
    border-bottom:3px solid var(--gold);
    position:relative;
    overflow:hidden;
  }
  .masthead::after{
    content:"";position:absolute;inset:0;
    background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:22px 22px;opacity:.6;pointer-events:none;
  }
  .mast-inner{max-width:1080px;margin:0 auto;position:relative;display:flex;align-items:center;gap:28px;}
  .mast-logo{height:80px;width:auto;flex-shrink:0;object-fit:contain;}
  .mast-text{flex:1;}
  .brand{
    font-family:'Fraunces',serif;font-weight:500;letter-spacing:.5px;
    font-size:14px;text-transform:uppercase;color:var(--gold-soft);
    margin:0 0 6px;
  }
  .mast-tagline{font-size:12px;color:rgba(194,161,77,0.6);letter-spacing:0.08em;margin:8px 0 0;font-style:italic;}
  .mast-inner h1{
    font-family:'Fraunces',serif;font-weight:500;
    font-size:clamp(26px,4.4vw,40px);line-height:1.05;margin:0;letter-spacing:.2px;
  }
  .mast-inner .sub{color:rgba(255,255,255,.72);margin:10px 0 0;max-width:620px;font-size:15px;}

  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 80px;}

  .layout{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start;}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:24px 22px;margin-bottom:22px;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 10px 30px -22px rgba(14,36,64,.35);
    animation:rise .5s ease both;
  }
  .card:nth-child(2){animation-delay:.05s}
  .card:nth-child(3){animation-delay:.1s}
  .card:nth-child(4){animation-delay:.15s}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .eyebrow{display:flex;align-items:center;gap:10px;margin:0 0 4px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
  .eyebrow span{font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted);font-weight:600;}
  h2{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:0 0 4px;color:var(--navy);}
  .hint{color:var(--muted);font-size:13.5px;margin:0 0 18px;}

  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 6px;}
  input[type=text],input[type=date],input[type=number],select{
    width:100%;padding:11px 12px;border:1px solid var(--line-strong);border-radius:9px;
    background:var(--field);font:inherit;color:var(--ink);
    transition:border-color .15s,box-shadow .15s;
  }
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,161,77,.18);}
  input::placeholder{color:#9aa6b4;}

  .id-grid{display:grid;grid-template-columns:1fr 270px;gap:16px;}
  @media (max-width:560px){.id-grid{grid-template-columns:1fr;}}

  /* ── Week calendar picker ───────────────────────── */
  .week-trigger{
    width:100%;padding:11px 12px;
    border:1px solid var(--line-strong);border-radius:9px;
    background:var(--field);font:inherit;color:var(--ink);
    text-align:left;cursor:pointer;
    transition:border-color .15s,box-shadow .15s;
    display:flex;justify-content:space-between;align-items:center;
    white-space:nowrap;overflow:hidden;
  }
  .week-trigger span{overflow:hidden;text-overflow:ellipsis;flex:1;}
  .week-trigger::after{content:"▾";color:var(--muted);font-size:13px;flex-shrink:0;margin-left:6px;}
  .week-trigger:focus,.week-trigger.open{
    outline:none;border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(194,161,77,.18);
  }
  .week-trigger.open::after{content:"▴";}
  #week-picker{
    position:fixed;
    background:#fff;border:1px solid var(--line-strong);border-radius:12px;
    box-shadow:0 8px 30px rgba(14,36,64,.2);
    z-index:9999;max-height:310px;overflow-y:auto;padding:4px 0 8px;
    min-width:320px;
  }
  .wk-q-header{
    padding:10px 14px 5px;
    font-size:10.5px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);
    border-top:1px solid var(--line);margin-top:4px;
    background:#FAFAF7;position:sticky;top:0;
  }
  .wk-q-header:first-child{border-top:none;margin-top:0;}
  .wk-row{
    display:grid;grid-template-columns:34px 1fr auto auto;
    align-items:center;gap:10px;
    padding:8px 14px;cursor:pointer;
    transition:background .12s;font-size:13px;
  }
  .wk-row:hover{background:rgba(194,161,77,.09);}
  .wk-row.selected{background:var(--navy);color:#fff;}
  .wk-row.wk-past{opacity:.5;}
  .wk-num{
    font-family:'Fraunces',serif;font-size:12px;font-weight:500;
    color:var(--gold);
  }
  .wk-row.selected .wk-num{color:var(--gold-soft);}
  .wk-range{color:var(--muted);font-size:12.5px;}
  .wk-row.selected .wk-range{color:rgba(255,255,255,.65);}
  .wk-fri{font-weight:600;white-space:nowrap;}
  .wk-row.selected .wk-fri{color:#fff;}
  .wk-this{
    font-size:10px;font-weight:700;color:var(--gold);
    letter-spacing:.06em;background:rgba(194,161,77,.12);
    padding:2px 6px;border-radius:4px;white-space:nowrap;
  }
  .wk-row.selected .wk-this{background:rgba(194,161,77,.25);color:var(--gold-soft);}

  /* Funnel as numbered stepped rows */
  .funnel{display:grid;gap:10px;}
  .frow{
    display:grid;grid-template-columns:30px 1fr 120px;align-items:center;gap:14px;
    padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--field);
  }
  .frow .step{
    width:26px;height:26px;border-radius:50%;display:grid;place-items:center;
    background:var(--navy);color:#fff;font-size:12px;font-weight:700;
  }
  .frow .flabel{font-weight:600;font-size:14.5px;}
  .frow .flabel small{display:block;font-weight:500;color:var(--muted);font-size:12px;}
  .frow input{text-align:center;}
  @media (max-width:560px){
    .frow{grid-template-columns:26px 1fr 88px;gap:10px;padding:9px 10px;}
    .frow .flabel small{display:none;}
  }

  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:560px){.two{grid-template-columns:1fr;}}
  .money-wrap{position:relative;}
  .money-wrap::before{content:"$";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-weight:600;}
  .money-wrap input{padding-left:24px;}

  /* By-type grid */
  .type-head,.type-row{display:grid;grid-template-columns:1.3fr .9fr .9fr 1fr .9fr 1fr;gap:10px;align-items:center;}
  .type-head{padding:0 4px 8px;border-bottom:1px solid var(--line);margin-bottom:8px;}
  .type-head div{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .type-head div:not(:first-child){text-align:center;}
  .type-row{padding:6px 4px;}
  .type-row .tname{font-weight:600;font-size:14px;}
  .type-row input{text-align:center;padding:9px 8px;}
  .type-row .mcell{position:relative;}
  .type-row .mcell::before{content:"$";position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;}
  .type-row .mcell input{padding-left:18px;}
  .cap{display:none;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:700;}
  .totrow{display:grid;grid-template-columns:1.3fr .9fr .9fr 1fr .9fr 1fr;gap:10px;margin-top:10px;padding:12px 4px 2px;border-top:2px solid var(--navy);}
  .totrow .tname{font-family:'Fraunces',serif;font-size:15px;color:var(--navy);}
  .totrow .tval{text-align:center;font-weight:700;}
  @media (max-width:680px){
    .type-head{display:none;}
    .type-row{grid-template-columns:1fr;gap:6px;padding:14px 12px;border:1px solid var(--line);border-radius:10px;background:var(--field);}
    .type-row .tname{font-size:15px;margin-bottom:4px;}
    .type-row .cap{display:block;}
    .totrow{grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px;}
    .totrow .tname{grid-column:1/-1;}
  }

  /* Summary rail */
  .rail{position:sticky;top:18px;}
  .rail .card{background:linear-gradient(165deg,#fff, #FBF8F0);}
  .metric{display:flex;justify-content:space-between;align-items:baseline;padding:11px 0;border-bottom:1px dashed var(--line);}
  .metric:last-of-type{border-bottom:none;}
  .metric .k{font-size:13px;color:var(--muted);font-weight:500;max-width:62%;}
  .metric .v{font-family:'Fraunces',serif;font-size:22px;color:var(--navy);font-weight:500;}
  .trailing-note{font-size:11.5px;color:var(--muted);line-height:1.45;margin:12px 0 0;padding-top:11px;border-top:1px dashed var(--line);}
  .recon{margin-top:14px;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:600;display:flex;gap:9px;align-items:flex-start;}
  .recon.ok{background:rgba(46,125,91,.10);color:var(--good);}
  .recon.bad{background:rgba(176,105,31,.12);color:var(--warn);}
  .recon ul{margin:6px 0 0;padding-left:16px;font-weight:500;}

  .points-head{padding-bottom:16px;margin-bottom:6px;border-bottom:1px solid var(--line);}
  .pts-row{display:flex;justify-content:space-between;align-items:baseline;}
  .pts-row span:first-child{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;}
  .pts-num{font-family:'Fraunces',serif;font-size:18px;color:var(--navy);}
  .pts-num b{font-size:28px;}
  .bar{height:10px;border-radius:6px;background:rgba(14,36,64,.10);overflow:hidden;margin:10px 0 6px;}
  .bar-fill{height:100%;width:0;background:var(--navy);border-radius:6px;transition:width .3s ease;}
  .bar-fill.hit{background:linear-gradient(90deg,var(--gold),var(--gold-soft));}
  .pts-flag{font-size:12px;font-weight:700;letter-spacing:.3px;color:var(--muted);}
  .pts-flag.hit{color:var(--gold);}
  .wprod{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;font-size:12.5px;color:var(--muted);}
  .wprod b{font-family:'Fraunces',serif;color:var(--navy);font-size:17px;}

  .btn{
    width:100%;border:none;border-radius:10px;padding:15px;font:inherit;font-weight:700;
    cursor:pointer;font-size:15px;letter-spacing:.3px;margin-top:18px;transition:transform .12s,filter .15s;
  }
  .btn.primary{background:var(--navy);color:#fff;}
  .btn.primary:hover{filter:brightness(1.12);}
  .btn.primary:active{transform:translateY(1px);}
  .btn.ghost{background:transparent;color:var(--navy);border:1px solid var(--line-strong);margin-top:10px;font-weight:600;}
  .btn.ghost:hover{background:var(--field);}
  .status{margin-top:14px;font-size:13.5px;border-radius:9px;padding:11px 13px;display:none;}
  .status.show{display:block;}
  .status.good{background:rgba(46,125,91,.1);color:var(--good);font-weight:600;}
  .status.err{background:rgba(176,105,31,.12);color:var(--warn);font-weight:600;}

  .gold-divider{
    max-width:1080px;margin:8px auto;padding:0 20px;
    display:flex;align-items:center;gap:18px;
  }
  .gold-divider::before,.gold-divider::after{
    content:"";flex:1;height:1px;
  }
  .gold-divider::before{background:linear-gradient(to right,transparent,var(--gold-soft));}
  .gold-divider::after{background:linear-gradient(to left,transparent,var(--gold-soft));}
  .gold-divider span{color:var(--gold);font-size:11px;white-space:nowrap;opacity:.7;}

  /* Daily tally card */
  .daily{margin-top:8px;}
  .daily-grid{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px;}
  .daily-grid th,.daily-grid td{border:1px solid var(--line-strong);padding:9px 8px;text-align:center;}
  .daily-grid th{background:var(--navy);color:#fff;font-weight:600;font-size:12px;}
  .daily-grid td:first-child{text-align:left;background:var(--field);font-weight:600;}
  .daily-grid th:first-child{text-align:left;}
  .daily-grid tfoot td{font-weight:700;background:#FBF8F0;}

  /* ── Daily tally table: horizontal scroll on small screens ── */
  .daily-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .daily-grid{min-width:480px;}

  /* ══════════════════════════════════════════════════
     MOBILE  (≤ 900px layout stack, ≤ 600px phone)
     ══════════════════════════════════════════════════ */

  /* Rail moves above form on mobile so agents see score while filling */
  @media (max-width:900px){
    .layout{display:flex;flex-direction:column;}
    .rail{order:-1;position:static;}
    .rail .card{margin-bottom:0;}
  }

  @media (max-width:600px){

    /* Masthead: stack logo + text, center */
    .masthead{padding:22px 16px 20px;}
    .mast-inner{flex-direction:column;align-items:center;text-align:center;gap:14px;}
    .mast-logo{height:56px;}
    .mast-inner h1{font-size:24px;}
    .mast-inner .sub{font-size:13.5px;margin-top:6px;}
    .mast-tagline{font-size:11px;}

    /* Wrap */
    .wrap{padding:14px 12px 60px;}
    .card{padding:16px 14px;margin-bottom:14px;border-radius:12px;}

    /* All inputs: 16px prevents iOS auto-zoom; taller tap targets */
    input[type=text],input[type=date],input[type=number],select,
    .week-trigger{
      font-size:16px !important;
      padding:13px 12px;
      min-height:48px;
    }

    /* id-grid: already 1-col at 560px, just ensure full spacing */
    .id-grid{gap:12px;}

    /* Funnel rows: bigger number input, show sublabels */
    .frow{
      grid-template-columns:28px 1fr;
      grid-template-rows:auto auto;
      gap:8px 10px;
      padding:12px 10px;
    }
    .frow .step{width:28px;height:28px;font-size:11px;}
    .frow input{
      grid-column:1/-1;
      text-align:left;
      font-size:16px !important;
      padding:13px 12px;
      min-height:48px;
    }
    .frow .flabel{font-size:14px;}
    .frow .flabel small{display:block;}

    /* Revenue two-col: already 1-col at 560px */
    .two{gap:12px;}

    /* Type grid: already card layout at 680px — tighten spacing */
    .type-row{padding:12px 10px;gap:8px;}
    .type-row .tname{font-size:14px;}
    .type-row input{font-size:16px !important;padding:11px 8px;min-height:44px;}

    /* Live snapshot: compact on mobile */
    .metric .v{font-size:18px;}
    .pts-num b{font-size:24px;}

    /* Buttons: full-width, taller tap targets */
    .btn{padding:17px;font-size:16px;border-radius:12px;}

    /* Footnote */
    .footnote{font-size:12px;padding:0 12px;}

    /* Gate: fits small screens */
    #gate-card{padding:36px 24px 28px;}
    #gate-logo{height:70px;}
    #gate-input{font-size:16px !important;min-height:48px;}
    #gate-btn{padding:14px;font-size:16px;min-height:48px;}
  }


  /* ── Locked / auto-calculated product mix inputs ─── */
  input.calc{
    background:rgba(14,36,64,.05);color:var(--navy);
    border-color:rgba(14,36,64,.12);cursor:default;
    font-weight:700;pointer-events:none;
  }
  input.calc:focus{box-shadow:none;border-color:rgba(14,36,64,.12);}
  .calc-badge{
    display:inline-flex;align-items:center;gap:5px;
    font-size:11px;color:var(--gold);font-style:italic;
    background:rgba(194,161,77,.10);border-radius:5px;
    padding:3px 8px;margin-bottom:14px;
  }

  /* ── Auto-calc from the selected agent's Team Cases ──────────
   Fills Product Mix, Revenue, funnel counts and the FYC scoreboard
   from cases credited to the selected agent for the loaded week.
   Individual page shows raw face value; splits live on the dashboard.
   ------------------------------------------------------------ */
function recalcFromCases(){
  const agent = document.getElementById("agent").value;
  const mine = (window.currentTeamCases || []).filter(function(c){ return c.submitting_agent === agent; });

  const totals = {};
  TYPES.forEach(function(t){ totals[t.id] = {count:0, submittedCount:0, sub:0, closedCount:0, clo:0}; });

  let potentialPremium=0, premiumWritten=0, premiumPipeline=0, aumTotal=0,
      bigCaseCount=0, closedFycSum=0, closedFycN=0, fycClosed=0;

  mine.forEach(function(c){
    const prodId = (TYPES.find(function(t){return t.name===c.product;})||{}).id;
    const srcId  = (SOURCES.find(function(s){return s.label===c.source;})||{}).id;
    const amt = Number(c.amount)||0;
    const aum = Number(c.aum)||0;
    const st  = c.state;

    if(srcId && SOURCE_PREMIUM[srcId]) potentialPremium += SOURCE_PREMIUM[srcId];
    aumTotal += aum;
    const rf = prodId ? rowFyc(prodId, amt) : 0;
    const rp = prodId ? rowPremium(prodId, amt) : 0;
    if(rf >= CONFIG.BIG_CASE_FYC) bigCaseCount++;
    if(st==="Submitted"){ premiumWritten += rp; premiumPipeline += rf; }
    if(st==="Opened")   { premiumPipeline += rf; }
    if(st==="Closed")   { fycClosed += rf; closedFycSum += rf; closedFycN++; }

    if(prodId){
      if(st==="Opened")    totals[prodId].count++;
      if(st==="Submitted"){ totals[prodId].submittedCount++; totals[prodId].sub += amt; }
      if(st==="Closed")   { totals[prodId].closedCount++;   totals[prodId].clo += amt; }
    }
  });

  TYPES.forEach(function(t){
    const c=document.getElementById(t.id+"_count"), sc=document.getElementById(t.id+"_submitted_count"),
          s=document.getElementById(t.id+"_sub"), cc=document.getElementById(t.id+"_closed_count"),
          cl=document.getElementById(t.id+"_closed");
    if(c)  c.value  = totals[t.id].count          || "";
    if(sc) sc.value = totals[t.id].submittedCount || "";
    if(s)  s.value  = totals[t.id].sub            || "";
    if(cc) cc.value = totals[t.id].closedCount    || "";
    if(cl) cl.value = totals[t.id].clo            || "";
  });

  let totalOpp=0, totalNbSub=0, totalNbClo=0;
  TYPES.forEach(function(t){ totalOpp+=totals[t.id].count; totalNbSub+=totals[t.id].submittedCount; totalNbClo+=totals[t.id].closedCount; });
  const oppEl=document.getElementById("opp_open"), nbsEl=document.getElementById("nb_written"), nbcEl=document.getElementById("nb_closed");
  if(oppEl) oppEl.value = totalOpp   || "";
  if(nbsEl) nbsEl.value = totalNbSub || "";
  if(nbcEl) nbcEl.value = totalNbClo || "";

  let totalSub=0, totalClo=0;
  TYPES.forEach(function(t){ totalSub += totals[t.id].sub; totalClo += totals[t.id].clo; });
  const rsi=document.getElementById("rev_sub"), rci=document.getElementById("rev_closed");
  if(rsi) rsi.value = totalSub || "";
  if(rci) rci.value = totalClo || "";

  GOALS.potentialPremium = potentialPremium;
  GOALS.premiumWritten   = premiumWritten;
  GOALS.premiumPipeline  = premiumPipeline;
  GOALS.aum              = aumTotal;
  GOALS.fycWeek          = fycClosed;
  GOALS.pipelineFyc      = premiumPipeline;
  GOALS.bigCaseCount     = bigCaseCount;
  GOALS.avgFycClosed     = closedFycN > 0 ? closedFycSum/closedFycN : 0;

  recalcGoals();
  recalc();
}
$("btnPrint").addEventListener("click", () => {
  document.body.classList.add("print-tally");
  window.print();
  window.addEventListener("afterprint", () => {
    document.body.classList.remove("print-tally");
  }, { once: true });
});

/* ── Role-based view controller ─────────────────────────────── */
(function(){
  const agent = document.getElementById('agent');
  const pgate = document.getElementById('pgate');
  const pIn   = document.getElementById('pgate-input');
  const pErr  = document.getElementById('pgate-err');
  let partnerUnlocked = false;

  function caLabel(role){
    const inp = document.getElementById('ca_sched');
    if(!inp) return;
    const row = inp.closest('.frow'); if(!row) return;
    const fl = row.querySelector('.flabel'); if(!fl) return;
    fl.innerHTML = (role==='associate')
      ? 'Closing Appointments SET<small>The closing meeting put on the calendar</small>'
      : 'Closing appointments scheduled<small>A presentation or ask meeting on the calendar</small>';
  }
  function applyAssociate(){
    document.body.classList.add('role-associate');
    document.body.classList.remove('role-partner');
    caLabel('associate'); recalcGoals(); recalc();
  }
  function applyPartner(){
    document.body.classList.add('role-partner');
    document.body.classList.remove('role-associate');
    caLabel('partner'); recalcGoals(); recalc();
  }
  function onAgentChange(){
    const name = agent.value;
    if(!name){ document.body.classList.remove('role-partner'); document.body.classList.add('role-associate'); caLabel('associate'); return; }
    if(roleOf(name)==='partner'){
      if(partnerUnlocked) applyPartner();
      else { pErr.textContent=''; pIn.value=''; pgate.classList.add('show'); setTimeout(()=>pIn.focus(),50); }
    } else { applyAssociate(); }
  }
  function tryUnlock(){
    if(pIn.value === PARTNER_PASSPHRASE){ partnerUnlocked = true; pgate.classList.remove('show'); applyPartner(); }
    else { pErr.textContent = 'Incorrect passphrase.'; pIn.value=''; pIn.focus(); }
  }
  function cancelUnlock(){
    pgate.classList.remove('show');
    agent.value = '';
    document.body.classList.remove('role-partner'); document.body.classList.add('role-associate');
    caLabel('associate');
  }
  agent.addEventListener('change', onAgentChange);
  document.getElementById('pgate-ok').addEventListener('click', tryUnlock);
  document.getElementById('pgate-cancel').addEventListener('click', cancelUnlock);
  pIn.addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });
  document.getElementById('sb_ytd_input').addEventListener('input', recalcGoals);
  document.body.classList.add('role-associate'); // safe default
})();

const CASES_ENDPOINT = "https://script.google.com/macros/s/AKfycbyBkStY31dgbEIkVCMFcgfFtM_LbVAtOCrDnzw9tDYIeK7H8cL5xdsTJkBlxZGnaQTN/exec";

function jsonpGetCases(week, cb){
  const name = "rwg_cb_" + Math.random().toString(36).slice(2);
  const script = document.createElement("script");
  let done = false;
  function cleanup(){ try{ delete window[name]; }catch(e){ window[name]=undefined; } if(script.parentNode) script.parentNode.removeChild(script); }
  window[name] = function(data){ done=true; cleanup(); cb(data); };
  script.onerror = function(){ if(!done){ cleanup(); cb({ok:false,error:"network"}); } };
  script.src = CASES_ENDPOINT + "?action=getCases&week=" + encodeURIComponent(week) + "&callback=" + name + "&_=" + Date.now();
  document.body.appendChild(script);
  setTimeout(function(){ if(!done){ cleanup(); cb({ok:false,error:"timeout"}); } }, 12000);
}

function postCase(payload, done){
  fetch(CASES_ENDPOINT, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  }).then(function(){ done(true); }).catch(function(){ done(false); });
}

(function(){
  const srcSel  = document.getElementById("tcSource");
  const prodSel = document.getElementById("tcProduct");
  if(srcSel)  srcSel.innerHTML  = '<option value="">- source -</option>'  + SOURCES.map(function(s){return '<option value="'+s.id+'">'+s.label+'</option>';}).join("");
  if(prodSel) prodSel.innerHTML = '<option value="">- product -</option>' + TYPES.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join("");

  const submitterSel = document.getElementById("tcSubmitter");
  if(submitterSel){
    submitterSel.innerHTML = Object.keys(ROLE_MAP).map(function(n){ return '<option value="'+n+'">'+n+'</option>'; }).join("");
  }
  function syncSubmitterDefault(){
    if(submitterSel && !editingId){
      const a = document.getElementById("agent").value;
      if(a) submitterSel.value = a;
    }
  }
  const agentSel0 = document.getElementById("agent");
  if(agentSel0) agentSel0.addEventListener("change", syncSubmitterDefault);
  if(agentSel0) agentSel0.addEventListener("change", recalcFromCases);
  const statusEl = document.getElementById("tcStatus");
  const listEl   = document.getElementById("tcList");
  let editingId = null;
  let currentCases = [];
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]; }); }
  function money(n){ return "$"+Math.round(n||0).toLocaleString("en-US"); }

  function render(cases){
    currentCases = cases || [];
    window.currentTeamCases = currentCases;
    recalcFromCases();
    if(!currentCases.length){ listEl.innerHTML=""; statusEl.textContent="No cases logged yet for this week."; return; }
    statusEl.textContent = currentCases.length + " case" + (currentCases.length>1?"s":"") + " this week";
    const isPartner = document.body.classList.contains("role-partner");
    const head = '<div class="tc-head"><span>Client</span><span>Product</span><span>State</span><span>Source</span><span class="tc-money">$ Amount</span><span class="tc-money">AUM</span><span>Agent</span><span></span></div>';
    listEl.innerHTML = head + currentCases.map(function(c){
      const st = c.state || "";
      return '<div class="tc-row">'+
        '<span class="tc-c-name">'+esc(c.client_name||"(no name)")+'</span>'+
        '<span>'+esc(c.product||"")+'</span>'+
        '<span class="tc-pill '+st+'">'+esc(st)+'</span>'+
        '<span class="tc-agent">'+esc(c.source||"")+'</span>'+
        '<span class="tc-money">'+money(c.amount)+'</span>'+
        '<span class="tc-money">'+(c.aum? money(c.aum):"-")+'</span>'+
        '<span class="tc-agent">'+esc(c.submitting_agent||"")+'</span>'+
        '<span class="tc-actions">'+
          '<button type="button" class="tc-edit" data-id="'+esc(c.record_id)+'">Edit</button>'+
          (isPartner ? '<button type="button" class="tc-del" data-id="'+esc(c.record_id)+'">Del</button>' : "")+
        '</span>'+
      '</div>';
    }).join("");
  }

  function load(){
    const week = document.getElementById("week").value;
    if(!week){ statusEl.textContent="Pick a week first."; return; }
    statusEl.textContent="Loading...";
    jsonpGetCases(week, function(resp){
      if(!resp || !resp.ok){ statusEl.textContent="Could not load (check the connection)."; return; }
      render(resp.cases || []);
    });
  }
  document.getElementById("tcLoadBtn").addEventListener("click", load);

  // Edit / delete via event delegation on the list
  listEl.addEventListener("click", function(e){
    const ed = e.target.closest(".tc-edit");
    const dl = e.target.closest(".tc-del");
    if(ed) startEdit(ed.getAttribute("data-id"));
    else if(dl) doDelete(dl.getAttribute("data-id"));
  });

  function startEdit(id){
    const c = currentCases.find(function(x){ return String(x.record_id)===String(id); });
    if(!c) return;
    document.getElementById("tcClient").value = c.client_name || "";
    const se = SOURCES.find(function(s){ return s.label===c.source; }); srcSel.value  = se ? se.id : "";
    const pe = TYPES.find(function(t){ return t.name===c.product; });   prodSel.value = pe ? pe.id : "";
    document.getElementById("tcState").value  = c.state || "Opened";
    document.getElementById("tcAmount").value = c.amount || "";
    document.getElementById("tcAum").value    = c.aum || "";
    if(submitterSel && c.submitting_agent) submitterSel.value = c.submitting_agent;
    editingId = c.record_id;
    document.getElementById("tcAddBtn").textContent = "Save changes";
    document.getElementById("tcCancelBtn").style.display = "";
    document.getElementById("tcAddStatus").textContent = "Editing " + (c.client_name||"case") + " ...";
    document.getElementById("tcClient").focus();
    document.getElementById("tcClient").scrollIntoView({block:"center"});
  }

  function resetAddForm(){
    editingId = null;
    document.getElementById("tcClient").value="";
    document.getElementById("tcAmount").value="";
    document.getElementById("tcAum").value="";
    srcSel.value=""; prodSel.value=""; document.getElementById("tcState").value="Opened";
    if(submitterSel){ const a=document.getElementById("agent").value; if(a) submitterSel.value=a; }
    document.getElementById("tcAddBtn").textContent="Add case";
    document.getElementById("tcCancelBtn").style.display="none";
  }
  document.getElementById("tcCancelBtn").addEventListener("click", function(){ resetAddForm(); document.getElementById("tcAddStatus").textContent=""; });

  function doDelete(id){
    const c = currentCases.find(function(x){ return String(x.record_id)===String(id); });
    const label = c ? (c.client_name||"this case") : "this case";
    if(!window.confirm("Delete " + label + "? This cannot be undone.")) return;
    document.getElementById("tcAddStatus").textContent="Deleting...";
    postCase({ action:"deleteCase", record_id:id, passphrase:PARTNER_PASSPHRASE }, function(ok){
      if(ok){ document.getElementById("tcAddStatus").textContent="Deleted."; setTimeout(load, 900); }
      else { document.getElementById("tcAddStatus").textContent="Delete failed."; }
    });
  }
  document.getElementById("tcAddBtn").addEventListener("click", function(){
    const week  = document.getElementById("week").value;
    const agent = document.getElementById("agent").value;
    const addStatus = document.getElementById("tcAddStatus");
    const isEdit = !!editingId;
    if(!week){  addStatus.textContent="Pick a week first."; return; }
    if(!agent && !isEdit){ addStatus.textContent="Select your name first."; return; }
    const client = document.getElementById("tcClient").value.trim();
    if(!client){ addStatus.textContent="Enter a client name."; return; }
    const orig = isEdit ? currentCases.find(function(x){ return String(x.record_id)===String(editingId); }) : null;
    const id = isEdit ? editingId : ((window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ("id-"+Date.now()+"-"+Math.random().toString(36).slice(2)));
    let submitter;
    if(document.body.classList.contains("role-partner") && submitterSel && submitterSel.value){ submitter = submitterSel.value; }
    else if(isEdit && orig && orig.submitting_agent){ submitter = orig.submitting_agent; }
    else { submitter = agent; }
    const payload = {
      action: isEdit ? "updateCase" : "createCase", record_id:id,
      week_ending:week,
      submitting_agent: submitter,
      client_name:client,
      source:(SOURCES.find(function(s){return s.id===srcSel.value;})||{}).label || "",
      product:(TYPES.find(function(t){return t.id===prodSel.value;})||{}).name || "",
      state:document.getElementById("tcState").value,
      amount:parseFloat(document.getElementById("tcAmount").value)||0,
      aum:parseFloat(document.getElementById("tcAum").value)||0,
      agent_involved: (isEdit && orig && orig.agent_involved) ? orig.agent_involved : "None"
    };
    addStatus.textContent = isEdit ? "Updating..." : "Saving...";
    postCase(payload, function(ok){
      if(ok){
        addStatus.textContent = isEdit ? "Updated." : "Saved.";
        resetAddForm();
        setTimeout(load, 900);
      } else { addStatus.textContent="Save failed (check connection)."; }
    });
  });
})();

const PASSPHRASE = "togetherwearemore";
(function(){
  const gate = document.getElementById("gate");
  const inp  = document.getElementById("gate-input");
  const btn  = document.getElementById("gate-btn");
  const err  = document.getElementById("gate-error");
  function attempt(){
    if(inp.value === PASSPHRASE){
      gate.style.display = "none";
    } else {
      err.textContent = "Incorrect passphrase. Try again.";
      inp.value = "";
      inp.focus();
    }
  }
  btn.addEventListener("click", attempt);
  inp.addEventListener("keydown", e => { if(e.key === "Enter") attempt(); });
  inp.focus();
})();
